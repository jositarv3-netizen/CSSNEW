   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ice Cream Shop Menu</title>

    <style>

        body{
            background-color:#fff5f8;
            font-family:Arial, sans-serif;
            text-align:center;
        }

        h1{
            color:#e84393;
            font-size:50px;
        }

        .welcome{
            background-color:#ffe6ef;
            color:#a55eea;
            padding:10px;
            font-weight:bold;
        }

        p{
            color:#555;
            font-size:22px;
        }

        .first-letter{
            color:#e84393;
            font-size:50px;
            font-weight:bold;
        }

        .menu-box{
            width:500px;
            margin:auto;
            background:white;
            border:4px solid #e84393;
            border-radius:20px;
            padding:30px;
        }

        h2{
            color:#333;
        }

        .flavour{
            border:2px solid #f8cdd8;
            padding:15px;
            margin:15px;
            border-radius:10px;
            font-weight:bold;
            color:#6d214f;
        }

        .special{
            border:4px solid #f9ca24;
            background-color:#fff9d6;
            color:#b9770e;
        }

        button{
            background-color:#e84393;
            color:white;
            border:none;
            padding:15px 35px;
            border-radius:30px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

    </style>
</head>

<body>

    <h1>My Ice Cream Shop Menu</h1>

    <div class="welcome">
        Welcome to Scoops of Joy!
    </div>

    <p>
        <span class="first-letter">W</span>
        e serve colourful, creamy, and delicious ice cream flavours.
    </p>

    <div class="menu-box">

        <h2>Today's Ice Cream Flavours</h2>

        <div class="flavour">Chocolate Delight</div>

        <div class="flavour">Strawberry Swirl</div>

        <div class="flavour special">
            Mango Magic - Today's Special
        </div>

        <div class="flavour">Vanilla Dream</div>

        <div class="flavour">Blueberry Blast</div>

        <button>Order Now</button>

    </div>

</body>
</html>
